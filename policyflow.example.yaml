# ══════════════════════════════════════════════════════════════════════
# 级联验证 — 非流式请求回答后自动做规则检查（拒答/截断/空响应），
# 不通过则沿能力评分升级到更强模型。流式请求跳过。
# ══════════════════════════════════════════════════════════════════════
cascade:
  enabled: true
  max_retries: 2                   # 最多升级几次
  escalation_chain:                # 静态升级链（兜底）
    - "deepseek-v4-flash"
    - "deepseek-v4-pro"

# ══════════════════════════════════════════════════════════════════════
# 日志 — 记录每次路由决策到 SQLite，用于仪表盘和 AI 优化。
# ══════════════════════════════════════════════════════════════════════
logging:
  log_prompt_preview: true      # 存用户提问原文前 500 字（默认开，AI 优化建议更精准）。多用户/合规敏感场景设 false 保护隐私

# ══════════════════════════════════════════════════════════════════════
# AI 优化引擎 — 分析历史日志，自动生成策略改进建议。
# ══════════════════════════════════════════════════════════════════════
optimizer:
  enabled: true
  model: deepseek-v4-flash      # 用哪个模型分析。⚠ 必须已在 providers 中配了真实 Key，否则自动降级为 upstream.fallback_model
  max_suggestions: 5            # 最多给几条建议
