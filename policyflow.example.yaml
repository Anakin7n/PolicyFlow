    match:
      keywords: [
        "你好", "hi", "hello", "在吗", "在不在",
        "谢谢", "感谢", "thanks",
        "晚安", "早上好", "下午好",
        "你是谁", "你叫什么", "你能做什么", "你会什么",
        "什么是", "怎么样", "好吗"
      ]
      max_input_tokens: 150
    route_to: "deepseek-v4-flash"

  - name: "默认"
    match:
      default: true               # 兜底：前面规则都没命中走这里（每个策略集必须有且只能有一条）
    route_to: "deepseek-v4-pro"

# ══════════════════════════════════════════════════════════════════════
# 级联验证 — 便宜模型先上，回答不行自动换更贵的。
# 只有策略里开了 cascade: true 的才会触发。
# ══════════════════════════════════════════════════════════════════════
cascade:
  enabled: true
  verifier: rule_then_llm          # rule_only=纯规则 / llm_judge=AI裁判 / rule_then_llm=先规则再AI
  judge_model: "deepseek-v4-flash" # AI 裁判模型（空=不用）。⚠ 必须已在 providers 中配了真实 Key，否则自动降级为 upstream.fallback_model
  judge_prompt_template: ""        # 自定义裁判提示词（空=用默认）
  max_retries: 2                   # 最多升级几次
  escalation_chain:                # 静态升级链（兜底）。正常走能力评分逐档升，只在极少数策略名无法映射任务类型时备用
    - "deepseek-v4-flash"
    - "deepseek-v4-pro"

# ══════════════════════════════════════════════════════════════════════
# 日志 — 记录每次路由决策到 SQLite，用于仪表盘和 AI 优化。
# ══════════════════════════════════════════════════════════════════════
logging:
  log_prompt_preview: true      # 存用户提问原文前 500 字（默认开，AI 优化建议更精准）。多用户/合规敏感场景设 false 保护隐私

# ══════════════════════════════════════════════════════════════════════
# AI 优化引擎 — 分析历史日志，自动生成策略改进建议。
# ══════════════════════════════════════════════════════════════════════
optimizer:
  enabled: true
  model: deepseek-v4-flash      # 用哪个模型分析。⚠ 必须已在 providers 中配了真实 Key，否则自动降级为 upstream.fallback_model
  max_suggestions: 5            # 最多给几条建议

# ══════════════════════════════════════════════════════════════════════
# 智能修饰器 — 策略匹配之前运行的规则检查，全是本地判断不调 API。
# 从上到下依次检查，命中即跳过后续策略匹配。
# ══════════════════════════════════════════════════════════════════════
modifiers:
  agent_detection: true         # 检测到 Agent/工具调用 → 强制用最强模型
  reasoning_detection: true     # 检测到复杂推理需求 → 切推理模型
  context_window_filter: true   # 输入超模型窗口 → 自动换大窗口模型
  session_persistence: true     # 同一会话固定用一个模型
  session_ttl: 1800             # 会话保持时间（秒），默认 30 分钟
  strongest_model: "auto"       # Agent 检测的目标模型，"auto"=从可用模型选 Agent 能力+性价比最优
  reasoning_model: "auto"       # 推理检测的目标模型，"auto"=从可用模型选推理能力+性价比最优
