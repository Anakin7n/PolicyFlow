# PolicyFlow configuration

# ── 默认路由模式 ──────────────────────────────────────────────────────
# 启动时未指定模式时的默认值。可选 hybrid / capability / explicit。
# 启动菜单里可以临时切换，不修改这里。
routing_mode: hybrid

# ── Providers: model → base_url + api_key mapping ─────────────────────
# Each provider maps to a vendor's API endpoint.  The ``protocol`` field
# tells PolicyFlow what format to send: "openai" (default, /v1/chat/completions)
# or "anthropic" (/v1/messages).  Only set ``protocol: anthropic`` when
# connecting directly to api.anthropic.com.  Aggregators (OpenRouter,
# OneAPI, Codex Plus) always use ``protocol: openai`` regardless of the
# model — they do their own internal protocol conversion.
#
# When a policy routes to a model, PolicyFlow looks up which provider
# owns that model and forwards the request there directly.
# Models not listed in any provider fall back to the default upstream.
providers:
  # ── 国内供应商 ───────────────────────────────────────────────
  deepseek:
    base_url: https://api.deepseek.com
    api_key: "${DEEPSEEK_API_KEY}"
    models:
      - "deepseek-v4-flash"
      - "deepseek-v4-pro"

  qwen:
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    api_key: "${DASHSCOPE_API_KEY}"
    models:
      - "qwen-max"
      - "qwen-plus"
      - "qwen-flash"
      - "qwen3-235b-a22b"
      - "qwen-vl-plus"

  # 火山 Coding Plan（Agent 订阅计划，可调用多厂商模型）
  # 排在 minimax/doubao/glm/kimi 前面 → 这些模型优先走 Coding Plan；额度用完/挂了自动 fallback 到各自官方
  # deepseek 系不放这里，统一走 deepseek 官方。没有订阅 Coding Plan 的删掉这个 provider 即可。
  volc-coding:
    base_url: https://ark.cn-beijing.volces.com/api/coding/v3
    api_key: "${VOLC_CODING_KEY}"
    models:
      - "doubao-seed-2.0-code"
      - "doubao-seed-2.0-pro"
      - "doubao-seed-2.0-lite"
      - "doubao-seed-code"
      - "glm-5.2"
      - "kimi-k2.7-code"
      - "kimi-k2.6"
      - "minimax-m3"
      - "minimax-m2.7"

  minimax:
    base_url: https://api.minimax.io/v1
    api_key: "${MINIMAX_API_KEY}"
    models:
      - "minimax-m3"
      - "minimax-m2.7"

  doubao:
    base_url: https://ark.cn-beijing.volces.com/api/v3
    api_key: "${DOUBAO_API_KEY}"
    models:
      # 填写模型 Model ID 即可（如 doubao-1.6），也可填 Endpoint ID 获得限流/监控等高级能力
      - "doubao-1.6"
      - "doubao-seed-2.0-lite"
      - "doubao-seed-2.0-code"
      - "doubao-seed-2.0-pro"
      - "doubao-seed-code"

  glm:
    base_url: https://open.bigmodel.cn/api/paas/v4
    api_key: "${ZHIPU_API_KEY}"
    models:
      - "glm-5"
      - "glm-5.1"
      # glm-5.2 已通过 volc-coding 调，此处不重复

  kimi:
    base_url: https://api.moonshot.cn/v1
    api_key: "${KIMI_API_KEY}"
    models:
      - "kimi-k2.6"
      - "kimi-k2.7-code"

  ernie:
    base_url: https://qianfan.baidubce.com/v2
    api_key: "${QIANFAN_API_KEY}"
    models:
      - "ernie-5.1"
      - "ernie-4.5-turbo"
      - "ernie-speed-pro"

  # ── 海外供应商 ───────────────────────────────────────────────
  google:
    base_url: https://generativelanguage.googleapis.com/v1beta/openai
    api_key: "${GOOGLE_API_KEY}"
    models:
      - "gemini-2.0-flash"
      - "gemini-2.5-flash"
      - "gemini-2.5-pro"
      - "gemini-3.5-flash"
      - "gemini-3.1-pro"

  anthropic:
    base_url: https://api.anthropic.com
    api_key: "${ANTHROPIC_API_KEY}"
    protocol: anthropic         # 直连 Anthropic 官方 API 才需要此行；中转站/聚合器不用
    models:
      - "claude-haiku-4-5"
      - "claude-sonnet-4-6"
      - "claude-opus-4-7"
      - "claude-opus-4-8"

  openai:
    base_url: https://api.openai.com/v1
    api_key: "${OPENAI_API_KEY}"
    models:
      - "gpt-4o"
      - "gpt-4o-mini"
      - "gpt-4-turbo"
      - "gpt-3.5-turbo"
      - "o1"
      - "o3-mini"

# ── Default upstream (fallback for models not in providers) ────────────
# 填你主用的供应商。也可用环境变量 UPSTREAM_BASE_URL / UPSTREAM_API_KEY 覆盖。
upstream:
  base_url: https://your-api-endpoint.com/v1
  api_key: "${UPSTREAM_API_KEY}"
  timeout: 60
  fallback_model: "deepseek-v4-flash"  # route_to 的模型找不到 provider 时，替换成这个再转发

# Embedding API for policy classification
embedding:
  base_url: https://ark.cn-beijing.volces.com/api/v3
  api_key: "${EMBEDDING_API_KEY}"
  model: doubao-embedding-vision-251215
  similarity_threshold: 0.55   # 全局语义匹配阈值（doubao-embedding 尺度,centroid 后初始值,真实流量上线后可再校准）
  verify_threshold: 0.55       # 关键词命中后的复核阈值（避免"苹果手机"误中"苹果"水果策略）
  timeout: 30

# ── 价格分档（capability 模式下 max_cost_tier 用） ─────────────
# 分档以加权平均价（input × 3 + output）/ 4 为准（USD/百万 token）
# 默认：cheap < 0.5、mid 0.5~1.7、expensive ≥ 1.7（按国产模型池校准，三档各有成员）
# 想让某模型进 cheap？查它的加权均价，把 cheap_max 调到其上即可
cost_tiers:
  cheap_max: 0.5
  mid_max:   1.7

# ══════════════════════════════════════════════════════════════════════
# 策略列表 — 从上到下依次匹配，命中即停止，都不命中走"默认"。
#
# 每条策略指定两件事：
#   1. 什么请求命中（match: keywords / has_image / 输入长度）
#   2. 命中后用什么模型（两种方式二选一）：
#      - 写死模型     → 你指定用哪个，系统不插手
#      - 声明任务类型 → 系统从你配的所有模型里按能力+价格算分选最优
#        任务类型可选：代码生成、代码审查、数学推理、逻辑分析、文本创作、
#                      翻译校对、图片理解、Agent工具调用、通用问答、
#                      系统设计、安全审计、性能优化
#        可选价格上限：max_cost_tier 设为 cheap / mid / expensive（≤上限，越高范围越大；expensive=全池放开）
# ══════════════════════════════════════════════════════════════════════

# ── 自由混合（hybrid 模式使用）────────────────────────────────────
# 每条策略自己决定：写死模型还是让系统选。
# 顺序原则：从最具体到最泛，命中即停。
policies_hybrid:
  - name: "图片理解"
    match:
      has_image: true
    description:
      - "看图描述、识别图片内容、解读截图、分析图表"
      - "这张图里有什么?帮我看看这个截图说明了什么问题"
      - "解读这张报表/流程图/UI 截图"
      - "从图片中提取文字、识别表格内容"
      - "看图回答问题、视觉问答"
    route_to: "qwen-vl-plus"

  - name: "代码生成"
    match:
      keywords: [
        "写代码", "写个", "写一段", "写一个函数", "写一个类",
        "SQL查询", "SQL语句", "API接口", "REST", "算法实现",
        "正则", "regex", "脚本", "shell", "bash",
        "如何实现"
      ]
    description:
      - "写一段代码、生成函数、实现算法、写脚本"
      - "帮我写一个 X、用 Y 实现 Z、给我一段 SQL/正则/Shell"
      - "实现某个功能、从零写出可运行代码"
      - "写 API 接口、写数据结构、写完整模块"
      - "算法题、编程题、把这个需求翻译成代码"
    route_to: "deepseek-v4-pro"

  - name: "代码审查与调试"
    match:
      keywords: [
        "debug", "调试", "修bug", "fix bug", "代码审查", "review代码",
        "重构", "refactor", "单元测试", "写测试", "test case",
        "报错", "异常", "stacktrace"
      ]
    description:
      - "看这段代码有什么问题、为什么报错、帮我修 bug、调试异常"
      - "代码 review、找 bug、解读 stacktrace、定位错误原因"
      - "重构这段代码、改进可读性、写单元测试"
      - "这段代码安全吗?有什么坑?"
      - "性能/逻辑/边界条件检查"
    route_to: "glm-5.2"

  - name: "数据分析与处理"
    match:
      keywords: [
        "分析数据", "数据分析", "Excel", "CSV", "表格", "电子表格",
        "统计", "趋势", "异常值", "数据可视化", "图表",
        "对比数据", "groupby", "透视", "数据清洗", "DataFrame", "pandas"
      ]
    description:
      - "分析这份数据、看出趋势、找异常值、做数据清洗"
      - "Excel/CSV/表格处理、pandas 操作、groupby 透视"
      - "数据可视化建议、生成图表、统计描述"
      - "解读统计结果、对比两组数据"
      - "数据预处理、特征工程、缺失值处理"
    route_to: "glm-5.2"

  - name: "文本创作与写作"
    match:
      keywords: [
        "写一封", "写一篇", "写个文案", "写文案", "起标题", "起个标题",
        "公众号", "微博", "朋友圈", "小红书", "知乎",
        "邮件", "求职信", "简历", "自荐", "求职",
        "产品介绍", "产品文案", "广告语", "slogan",
        "写诗", "写歌词", "故事", "小说", "剧本",
        "扩写", "续写", "改写"
      ]
    description:
      - "写一篇文章/邮件/文案/小说/诗"
      - "起标题、写广告语、产品介绍、宣传文案"
      - "公众号、小红书、朋友圈风格写作"
      - "故事创作、剧本、续写扩写"
      - "改写润色、调整语气、风格转换"
    route_to: "deepseek-v4-flash"

  - name: "翻译、摘要、格式化"
    match:
      keywords: [
        "翻译", "translate", "译成", "中译英", "英译中",
        "摘要", "总结", "summarize", "概括", "提炼要点",
        "格式化", "排版", "整理格式",
        "纠错", "校对", "改错别字", "修改语法",
        "润色", "polish"
      ]
      max_input_tokens: 800
    description:
      - "把这段翻译成英文/中文/日文等其他语言"
      - "总结这段内容、提炼要点、生成摘要"
      - "格式化文本、整理排版、转 Markdown/HTML"
      - "校对纠错、修改语法、polish 文字"
      - "中英互译、跨语言转换"
    route_to: "deepseek-v4-flash"

  - name: "复杂推理与分析"
    match:
      keywords: [
        "数学证明", "证明", "推导", "求证",
        "策略分析", "战略", "决策", "方案对比", "tradeoff", "权衡",
        "复盘", "深度分析", "评估"
      ]
      min_input_tokens: 200
    description:
      - "数学证明、定理推导、求证、严格论证"
      - "多步推理、逻辑分析、因果推断"
      - "方案对比权衡、tradeoff 分析、决策推理"
      - "复盘事件、深度归因、找出根本原因"
      - "因果链分析、严密论证"
    route_to: "deepseek-pro"

  - name: "系统架构与设计"
    match:
      keywords: [
        "架构设计", "系统设计", "技术方案", "技术选型",
        "微服务", "高并发", "分布式", "数据库设计"
      ]
      min_input_tokens: 200
    description:
      - "设计一个 X 系统、技术方案、架构图"
      - "微服务/分布式/高并发/数据库 设计"
      - "技术选型、组件拆分、模块划分"
      - "容量规划、扩展性设计、可用性方案"
      - "从零设计端到端工程方案"
    route_to: "glm-5.2"

  - name: "安全审计与分析"
    match:
      keywords: [
        "安全审计", "安全分析", "威胁建模", "漏洞",
        "渗透", "加密", "鉴权", "授权", "OAuth"
      ]
      min_input_tokens: 150
    description:
      - "这段代码/配置有安全风险吗、做威胁建模"
      - "找漏洞、检查注入、XSS、CSRF、权限漏洞"
      - "鉴权/授权/OAuth 流程审计"
      - "加密方案是否安全、密钥管理、敏感数据保护"
      - "渗透测试思路、安全合规检查"
    route_to: "glm-5.2"

  - name: "性能分析与调优"
    match:
      keywords: [
        "性能优化", "性能分析", "瓶颈", "调优",
        "加速", "慢查询", "优化SQL", "高延迟"
      ]
      min_input_tokens: 150
    description:
      - "这段代码/SQL 慢在哪、找性能瓶颈"
      - "优化响应时间、降低延迟、提升 QPS"
      - "SQL 慢查询分析、索引优化"
      - "CPU/内存/IO 调优、profiling 分析"
      - "高并发场景下的性能改进"
    route_to: "deepseek-v4-pro"

  - name: "知识问答与学习"
    match:
      keywords: [
        "为什么", "原理", "工作原理", "运作机制", "机制",
        "原因", "缘由", "由来", "起源", "历史",
        "区别", "差异", "vs", "...的不同",
        "怎么学", "如何学", "怎么入门", "入门",
        "讲讲", "介绍下", "科普", "解读"
      ]
      min_input_tokens: 60        # 排除"为什么呢"这类闲聊式短问
    description:
      - "为什么 X 会这样、X 的工作原理是什么"
      - "X 和 Y 的区别、对比解释、关系梳理"
      - "入门 X 应该怎么学、推荐学习路径"
      - "解释概念、科普某个领域、追溯起源/历史"
      - "因果机制解释、原理性回答"
    route_to: "deepseek-v4-pro"

  - name: "日常闲聊与简单问答"
    match:
      keywords: [
        "你好", "hi", "hello", "在吗", "在不在",
        "谢谢", "感谢", "thanks",
        "晚安", "早上好", "下午好",
        "你是谁", "你叫什么", "你能做什么", "你会什么",
        "什么是", "怎么样", "好吗"
      ]
      max_input_tokens: 150       # 短问句兜住，长文走更深的策略
    description:
      - "你好、hi、在吗、谢谢、晚安"
      - "你是谁、你能做什么、你叫什么名字"
      - "寒暄、招呼、确认收到、客套话"
      - "自我介绍类问答"
      - "客套礼貌用语、问候"
    route_to: "deepseek-v4-flash"

# ── 算法全托管（capability 模式使用）───────────────────────────────
# 不写 route_to — 根据识别出的任务类型，从所有可用模型里算分选最优。
policies_capability:
  - name: "图片理解"
    match:
