# PolicyFlow configuration

# ── Providers: model → base_url + api_key mapping ─────────────────────
# Each provider maps to a vendor's OpenAI-compatible API endpoint.
# When a policy routes to a model, PolicyFlow looks up which provider
# owns that model and forwards the request there directly.
# Models not listed in any provider fall back to the default upstream.
providers:
  # ── 国内供应商 ───────────────────────────────────────────────
  deepseek:
    base_url: https://api.deepseek.com
    api_key: "${DEEPSEEK_API_KEY}"
    models:
      - "deepseek-v4-flash"
      - "deepseek-v4-pro"
      - "deepseek-v3"
      - "deepseek-r1"

  qwen:
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    api_key: "${DASHSCOPE_API_KEY}"
    models:
      - "qwen3.7-max"
      - "qwen3-plus"
      - "qwen3.5-flash"
      - "qwen3-235b"
      - "qwen3-vl-plus"

  glm:
    base_url: https://open.bigmodel.cn/api/paas/v4
    api_key: "${ZHIPU_API_KEY}"
    models:
      - "glm-5.2"
      - "glm-5"
      - "glm-5.1"

  kimi:
    base_url: https://api.moonshot.cn/v1
    api_key: "${KIMI_API_KEY}"
    models:
      - "kimi-k2.6"

  doubao:
    base_url: https://ark.cn-beijing.volces.com/api/v3
    api_key: "${DOUBAO_API_KEY}"
    models:
      # ⚠️ 豆包 model 字段必须填火山引擎 Endpoint ID（如 ep-20250106xxx），不能填模型名
      # 去 console.volcengine.com → ARK → 模型推理 → 创建接入点 → 复制 Endpoint ID
      - "doubao-1.6"
      - "doubao-seed-2.0-lite"

  ernie:
    base_url: https://qianfan.baidubce.com/v2
    api_key: "${QIANFAN_API_KEY}"
    models:
      - "ernie-5.1"
      - "ernie-4.5-turbo"
      - "ernie-speed-pro"

  # ── 海外供应商 ───────────────────────────────────────────────
  anthropic:
    base_url: https://api.anthropic.com
    api_key: "${ANTHROPIC_API_KEY}"
    models:
      - "claude-haiku-4-5"
      - "claude-sonnet-4-6"
      - "claude-opus-4-7"
      - "claude-opus-4-8"

  openai:
    base_url: https://api.openai.com/v1
    api_key: "${OPENAI_API_KEY}"
    models:
      - "gpt-4o"
      - "gpt-4o-mini"
      - "o3-mini"

# ── Default upstream (fallback for models not in providers) ────────────
upstream:
  base_url: https://api.deepseek.com
  api_key: "${DEEPSEEK_API_KEY}"
  timeout: 60

# Embedding API for policy classification
embedding:
  base_url: https://ark.cn-beijing.volces.com/api/v3
  api_key: "${EMBEDDING_API_KEY}"
  model: doubao-embedding-vision-250615
  similarity_threshold: 0.75
  timeout: 30

# Routing policies — first match wins, then default.
# Two modes:
#   route_to: "model-name"           → explicit routing (current, simple)
#   specialty: 任务类型               → capability-aware auto-select (智能选模)
#     Supported specialties: 代码生成 代码审查 数学推理 逻辑分析 文本创作
#                            翻译校对 图片理解 Agent工具调用 通用问答
#                            系统设计 安全审计 性能优化
#     Optional: max_cost_tier: cheap|mid|expensive for budget control
policies:
  - name: "翻译、摘要、格式化"
    match:
      keywords: ["翻译", "摘要", "改写", "格式化", "纠错", "扩写", "润色"]
      max_input_tokens: 800
    route_to: "claude-haiku-4-5"
    cascade: true

  - name: "代码生成与审查"
    match:
      keywords: ["写代码", "debug", "代码审查", "重构", "单元测试",
                 "SQL查询", "API接口", "算法实现", "修bug"]
    route_to: "claude-sonnet-4-6"

  - name: "复杂推理与分析"
    match:
      keywords: ["数学证明", "架构设计", "策略分析", "技术方案",
                 "安全审计", "性能优化", "系统设计"]
      min_input_tokens: 200
    route_to: "claude-opus-4-8"

  - name: "图片理解"
    match:
      has_image: true
    route_to: "gpt-4o"

  - name: "默认"
    match:
      default: true
    route_to: "claude-sonnet-4-6"

# Cascade validation — verify cheap-model responses, escalate on failure
# Inspired by NadirClaw: "先让便宜模型试试，不行再换贵的"
cascade:
  enabled: true
  verifier: rule_only           # rule_only | llm_judge | rule_then_llm
  judge_model: ""               # Model for LLM-as-Judge (empty = disabled)
  judge_prompt_template: ""     # Custom judge prompt (empty = use default)
  max_retries: 2
  escalation_chain:
    - "claude-haiku-4-5"
    - "claude-sonnet-4-6"
    - "claude-opus-4-8"

# Smart modifiers — rule-based checks that override routing
# ── Logging (privacy-aware) ──────────────────────────────────────────
logging:
  log_prompt_preview: false   # Store first 500 chars of prompt (opt-in)

# ── AI Optimization engine ────────────────────────────────────────────
optimizer:
  enabled: true
  model: deepseek-v4-flash
  max_suggestions: 5

# ── Smart modifiers ──────────────────────────────────────────────────
modifiers:
  agent_detection: true        # Agent请求 → 强制最强模型
  reasoning_detection: true    # 推理任务 → reasoning模型
  context_window_filter: true  # 超出窗口 → 自动切大窗口模型
  session_persistence: true    # 同会话 → 固定模型
  session_ttl: 1800            # 会话TTL (秒), 默认30分钟
  strongest_model: "claude-opus-4-8"
  reasoning_model: "claude-opus-4-8"
