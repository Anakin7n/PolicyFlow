# PolicyFlow 示例配置 — 开发场景（编程为主）
#
# 适用场景: 个人/团队开发，大量代码生成和 debug
# 核心思路: 代码走代码模型，复杂设计走推理模型，其余走便宜模型
#
# 用法: cp examples/policyflow-dev.yaml policyflow.yaml

routing_mode: explicit

# ── Providers ────────────────────────────────────────────────────────
providers:
  deepseek:
    base_url: https://api.deepseek.com
    api_key: "${DEEPSEEK_API_KEY}"
    models:
      - "deepseek-v4-flash"
      - "deepseek-v4-pro"
      - "deepseek-v3"
      - "deepseek-r1"

  anthropic:
    base_url: https://api.anthropic.com
    api_key: "${ANTHROPIC_API_KEY}"
    models:
      - "claude-sonnet-4-6"
      - "claude-opus-4-8"

# ── Default upstream ──────────────────────────────────────────────────
upstream:
  base_url: https://api.deepseek.com
  api_key: "${DEEPSEEK_API_KEY}"
  timeout: 60

# ── Embedding ─────────────────────────────────────────────────────────
embedding:
  base_url: https://ark.cn-beijing.volces.com/api/v3
  api_key: "${EMBEDDING_API_KEY}"
  model: doubao-embedding-vision-250615
  similarity_threshold: 0.75
  verify_threshold: 0.5
  timeout: 30

# ── Cost tiers ────────────────────────────────────────────────────────
cost_tiers:
  cheap_max: 1.0
  mid_max:   5.0

# ── Policies (hybrid) ─────────────────────────────────────────────────
policies_hybrid:
  - name: "代码生成"
    match:
      keywords: [
        "写代码", "写个", "写一段", "写一个函数", "写一个类",
        "SQL查询", "SQL语句", "API接口", "REST", "算法实现",
        "正则", "regex", "脚本", "shell", "bash",
        "如何实现"
      ]
    route_to: "deepseek-v4-pro"

  - name: "代码审查与调试"
    match:
      keywords: [
        "debug", "调试", "修bug", "fix bug", "代码审查", "review代码",
        "重构", "refactor", "单元测试", "写测试", "test case",
        "报错", "异常", "stacktrace"
      ]
    route_to: "deepseek-v4-pro"

  - name: "复杂架构与系统设计"
    match:
      keywords: [
        "架构设计", "系统设计", "技术方案", "技术选型",
        "策略分析", "方案对比", "tradeoff", "权衡",
        "性能优化", "性能分析", "瓶颈", "调优",
        "安全审计", "安全分析",
        "数学证明", "推导", "求证"
      ]
      min_input_tokens: 200
    route_to: "claude-opus-4-8"

  - name: "数据分析与处理"
    match:
      keywords: [
        "分析数据", "数据分析", "Excel", "CSV", "表格",
        "统计", "趋势", "异常值", "数据可视化", "图表",
        "对比数据", "groupby", "透视", "DataFrame", "pandas"
      ]
    route_to: "claude-sonnet-4-6"

  - name: "图片理解"
    match:
      has_image: true
    route_to: "claude-sonnet-4-6"

  - name: "日常闲聊与简单问答"
    match:
      keywords: [
        "你好", "hi", "hello", "在吗",
        "谢谢", "感谢",
        "你是谁", "你叫什么", "你能做什么", "你会什么",
        "什么是", "怎么样"
      ]
      max_input_tokens: 150
    route_to: "deepseek-v4-flash"

  - name: "默认"
    match:
      default: true               # 兜底：前面规则都没命中走这里
    route_to: "deepseek-v4-pro"

# ── Cascade ───────────────────────────────────────────────────────────
cascade:
  enabled: true
  verifier: rule_only
  escalation_chain:
    - "deepseek-v4-flash"
    - "deepseek-v4-pro"
    - "claude-sonnet-4-6"
  max_retries: 2

# ── Modifiers ─────────────────────────────────────────────────────────
modifiers:
  agent_detection: true
  reasoning_detection: true
  context_window_filter: false
  session_persistence: true
  session_ttl: 1800
  strongest_model: "claude-opus-4-8"
  reasoning_model: "deepseek-r1"

# ── Optimizer ─────────────────────────────────────────────────────────
optimizer:
  enabled: true
  model: deepseek-v4-flash
  max_suggestions: 5

# ── Logging ───────────────────────────────────────────────────────────
logging:
  log_prompt_preview: true      # 默认开，AI 优化建议更精准；隐私敏感设 false
